name: CI - Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # Dùng Ubuntu runner cho việc build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3  # Clone mã nguồn từ repository

    - name: Set up CMake
      uses: cmake/setup-cmake@v3
      with:
        cmakeVersion: '3.x'  # Cài CMake phiên mong muốn

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt5-default libopencv-dev

    - name: Create build directory
      run: |
        mkdir build
        cd build
        cmake ..
        
    - name: Build the project
      run: |
        cd build
        cmake --build . --config Release
